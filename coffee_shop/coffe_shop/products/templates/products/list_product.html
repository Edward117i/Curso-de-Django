<h1>Lista de productos</h1>
<ul>
    {% for product in products %}
        <li>
            <h2>{{ product.name }}</h2>
            <p>{{ product.description }}</p>
            <p>Precio: ${{ product.price }}</p>
            {% if product.photo %}
                <img src="{{ product.photo.url }}" alt="{{ product.name }}" style="max-height: 100px;">
            {% endif %}
        </li>
    {% endfor %}
</ul>
